<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Sarah Office Test</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#f5f3ff,#fdf2f8);
  text-align:center;
  padding:30px;
}

.office-scene{
  width:420px;
  margin:30px auto;
  position:relative;
  background:linear-gradient(180deg,#ffffff,#f3e8ff);
  border-radius:28px;
  padding:25px;
  box-shadow:0 15px 35px rgba(88,28,135,.18);
  overflow:hidden;
}

/* فقاعة الكلام */
.speech{
  background:white;
  color:#3b0764;
  border-radius:22px;
  padding:15px;
  width:300px;
  margin:0 auto 20px;
  box-shadow:0 8px 20px rgba(88,28,135,.15);
  font-weight:bold;
  line-height:1.7;
  position:relative;
}

.speech::after{
  content:"";
  position:absolute;
  bottom:-14px;
  right:80px;
  border-width:14px 12px 0 12px;
  border-style:solid;
  border-color:white transparent transparent transparent;
}

/* سارة */
.sara-wrap{
  position:relative;
  width:180px;
  margin:0 auto;
}

/* عدلي الشعر */
.hair{
  width:115px;
  height:150px;
  background:#3b1f1f;
  border-radius:55px 55px 45px 45px;
  position:absolute;
  top:1px;
  left:32px;
  z-index:1;
}

.bangs{
  position:absolute;
  top:0;
  left:4px;
  width:92px;
  height:30px;
  background:#3b1f1f;
  border-radius:35px 35px	0	0;
}

/* عدلي المكتب إلى بني */
.desk{
  width:330px;
  height:75px;
  background:linear-gradient(180deg,#b7794b,#8b5a2b);
  margin:-10px auto 0;
  border-radius:18px;
  position:relative;
  z-index:4;
  box-shadow:0 12px 20px rgba(92,51,23,.25);
}

/* بدال الكتب */
.paper-pencil{
  position:absolute;
  left:28px;
  top:12px;
  font-size:34px;
  z-index:6;
}

/* عدلي القهوة */
.cup{
  position:absolute;
  right:30px;
  top:14px;
  font-size:32px;
  z-index:6;
}

.face{
  width:100px;
  height:100px;
  background:#f8cfa9;
  border-radius:50%;
  position:relative;
  margin:15px auto 0;
  z-index:2;
  box-shadow:inset 0 -5px 0 rgba(0,0,0,.05);
}



.eye{
  width:10px;
  height:10px;
  background:#1f2937;
  border-radius:50%;
  position:absolute;
  top:42px;
}

.eye.left{left:28px;}
.eye.right{right:28px;}

.cheek{
  width:14px;
  height:8px;
  background:#f9a8d4;
  border-radius:50%;
  position:absolute;
  top:58px;
  opacity:.7;
}

.cheek.left{left:18px;}
.cheek.right{right:18px;}

/* الفم */
.mouth{
  position:absolute;
  left:35px;
  width:30px;
  height:16px;
  bottom:22px;
}

.mouth.neutral{
  height:4px;
  background:#7f1d1d;
  border-radius:8px;
  bottom:28px;
}

.mouth.happy{
  border-bottom:4px solid #7f1d1d;
  border-radius:0 0 25px 25px;
}

.mouth.sad{
  border-top:4px solid #7f1d1d;
  border-radius:25px 25px 0 0;
  bottom:18px;
}

.body{
  width:95px;
  height:85px;
  background:linear-gradient(180deg,#a855f7,#7e22ce);
  border-radius:35px 35px 12px 12px;
  margin:-5px auto 0;
  position:relative;
  z-index:1;
}

.arm{
  width:18px;
  height:65px;
  background:#f8cfa9;
  border-radius:14px;
  position:absolute;
  top:115px;
  z-index:3;
}

.arm.left{
  left:38px;
  transform:rotate(25deg);
}

.arm.right{
  right:38px;
  transform:rotate(-25deg);
}

/* المكتب */


.laptop{
  width:120px;
  height:70px;
  background:#334155;
  border-radius:8px 8px 2px 2px;
  position:absolute;
  top:-50px;
  left:105px;
  box-shadow:0 8px 12px rgba(0,0,0,.2);
}

.laptop::after{
  content:"";
  position:absolute;
  width:150px;
  height:12px;
  background:#1e293b;
  border-radius:10px;
  bottom:-12px;
  left:-15px;
}

.laptop-screen{
  color:#c4b5fd;
  font-size:24px;
  margin-top:20px;
}


.books{
  position:absolute;
  left:25px;
  top:-28px;
  font-size:34px;
}

/* النجوم */
.stars{
  position:absolute;
  top:70px;
  left:0;
  right:0;
  font-size:28px;
  opacity:0;
  transform:scale(.5);
  transition:.3s;
  pointer-events:none;
}

.stars.show{
  opacity:1;
  transform:scale(1.2);
}

/* اهتزاز عند الخطأ */
.shake{
  animation:shake .35s;
}

@keyframes shake{
  0%{transform:translateX(0);}
  25%{transform:translateX(10px);}
  50%{transform:translateX(-10px);}
  75%{transform:translateX(8px);}
  100%{transform:translateX(0);}
}

.controls button{
  padding:10px 18px;
  margin:6px;
  border:none;
  border-radius:14px;
  background:#7e22ce;
  color:white;
  cursor:pointer;
  font-size:16px;
}

.controls .wrong{
  background:#be123c;
}

.controls .reset{
  background:#64748b;
}
</style>
</head>

<body>

<h1>💼 تجربة شخصية سارة</h1>

<div class="office-scene" id="officeScene">

  <div class="speech">
    <span id="saraText">مرحبًا، أنا سارة. ساعديني في اختيار الأداة المناسبة للمهمة.</span>
  </div>

  <div class="stars" id="stars">✨ ⭐ ✨</div>

  <div class="sara-wrap">
    <div class="hair"></div>

    <div class="face">
      <div class="bangs"></div>
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="cheek left"></div>
      <div class="cheek right"></div>
      <div id="mouth" class="mouth neutral"></div>
    </div>

    <div class="body"></div>
    <div class="arm left"></div>
    <div class="arm right"></div>
  </div>

<div class="desk">
  <div class="paper-pencil">📝</div>

  <div class="laptop">
    <div class="laptop-screen"></div>
  </div>

  <div class="cup">☕</div>
</div>
</div>

<div class="controls">
  <button onclick="successSara()">اختيار صحيح</button>
  <button class="wrong" onclick="failSara()">اختيار خاطئ</button>
  <button class="reset" onclick="resetSara()">إعادة</button>
</div>

<script>
function setMouth(state){
  const mouth = document.getElementById("mouth");
  mouth.className = "mouth " + state;
}

function successSara(){
  setMouth("happy");

  document.getElementById("saraText").innerText =
    "رائع! اخترتِ الأداة المناسبة، والآن يمكنني إكمال المهمة بنجاح.";

  const stars = document.getElementById("stars");
  stars.classList.add("show");

  setTimeout(()=>{
    stars.classList.remove("show");
  },900);
}

function failSara(){
  setMouth("sad");

  document.getElementById("saraText").innerText =
    "هذه الأداة غير مناسبة للمهمة. لنحاول مرة أخرى قبل انتهاء الوقت.";

  const scene = document.getElementById("officeScene");
  scene.classList.add("shake");

  setTimeout(()=>{
    scene.classList.remove("shake");
  },400);
}

function resetSara(){
  setMouth("neutral");

  document.getElementById("saraText").innerText =
    "مرحبًا، أنا سارة. ساعديني في اختيار الأداة المناسبة للمهمة.";

  document.getElementById("stars").classList.remove("show");
}
</script>

</body>
</html>
